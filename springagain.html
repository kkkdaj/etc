    code { background: #F5F5F5; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; }

    .spinner {

    .mission-box {

      line-height: 1.65; margin-bottom: 16px; border-left: 3px solid var(--pink);

    .stat-row { display: flex; gap: 0; }

    .stat-item + .stat-item { border-left: 1px solid var(--border); }
    .stat-num { font-size: 26px; font-weight: 900; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
    a { color: var(--pink-dark); }
  </style>
</head>

  isAdmin: false,
  submissions: {},   // key: `${team}_${week}` → data
  scores: {},        // key: `${team}_${week}` → number
  passwords: { ...DEFAULT_PASSWORDS },
  feedWeek: 1,
  submitWeek: 1,
  showTeamModal: false,
  pendingTeam: null, // 비밀번호 확인 중인 팀
  dataLoaded: false,
  previews: {},      // key: field key → { url, isVideo }
};

/* ============================================================
   FIREBASE
   ============================================================ */
let db, fbReady = false;

/* ============================================================
   CLOUDINARY CONFIG
   ============================================================ */
const CLOUDINARY_CLOUD = 'djtjurl0w';
const CLOUDINARY_PRESET = 'ryrbgcha';

function initFB() {
  try {
    if (firebaseConfig.apiKey === 'YOUR_API_KEY') return false;
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    fbReady = true;
    return true;
  } catch(e) { console.error(e); return false; }
}

function startSync() {
  // 비밀번호 동기화
  db.collection('config').doc('passwords').onSnapshot(snap => {
    if (snap.exists) S.passwords = { ...DEFAULT_PASSWORDS, ...snap.data() };
    else S.passwords = { ...DEFAULT_PASSWORDS };
  });

  db.collection('submissions').onSnapshot(snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'removed') delete S.submissions[ch.doc.id];
      else S.submissions[ch.doc.id] = ch.doc.data();
    });
    S.dataLoaded = true;
    render();
  }, err => { showToast('데이터 로드 실패: ' + err.message); S.dataLoaded = true; render(); });

  db.collection('scores').onSnapshot(snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'removed') delete S.scores[ch.doc.id];
      else S.scores[ch.doc.id] = ch.doc.data().score;
    });
    render();
  });
}

async function saveSubmission(team, week, data) {
  const key = `${team}_${week}`;
  await db.collection('submissions').doc(key).set({
    ...data, team, week,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

async function saveScore(team, week, score) {
  const key = `${team}_${week}`;
  await db.collection('scores').doc(key).set({
    team, week, score,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

async function uploadFile(file) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  const resourceType = file.type.startsWith('video/') ? 'video' : 'image';
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${resourceType}/upload`, {
    method: 'POST', body: formData
  });
  if (!res.ok) throw new Error('이미지 업로드 실패');
  const data = await res.json();
  return data.secure_url;
}

/* ============================================================

  });
  h += `</div></div>`;

    h += `<div class="form-group"><label class="form-label">${f.label}</label>`;

      const prev = S.previews[f.key];

        h += `<img src="${prev.url}" class="upload-preview" alt="preview">`;

        h += `<img src="${existUrl}" class="upload-preview" alt="current">`;
      } else {
        h += `<span class="upload-ico">📷</span><div class="upload-hint">탭하여 사진 선택</div>`;
      }
      h += `</div><input type="file" id="fi-${f.key}" accept="image/*" style="display:none" onchange="onFileChange(this,'${f.key}')">`;
    } else if (f.type === 'media') {
      const prev = S.previews[f.key];

      const existIsVideo = existing?.mediaType === 'video';
      h += `<div class="upload-zone" onclick="triggerFile('${f.key}', 'image/*,video/*')">`;

        if (prev.isVideo) h += `<video src="${prev.url}" class="upload-video" controls></video>`;
        else h += `<img src="${prev.url}" class="upload-preview" alt="preview">`;

        if (existIsVideo) h += `<video src="${existUrl}" class="upload-video" controls></video>`;

      } else {
        h += `<span class="upload-ico">📷</span><div class="upload-hint">탭하여 사진 또는 영상 선택</div>`;

      h += `</div><input type="file" id="fi-${f.key}" accept="image/*,video/*" style="display:none" onchange="onFileChange(this,'${f.key}')">`;

  return h;

  WEEKS.forEach(w => {

    h += `<button class="tab${S.feedWeek===w.n?' active':''}" onclick="setFeedWeek(${w.n})">${w.n}주차 <span style="opacity:0.75;">(${cnt})</span></button>`;
  });
  h += `</div>`;

  const wk = WEEKS[S.feedWeek - 1];
  h += `<div style="font-size:13px;color:var(--muted);margin-bottom:14px;">${wk.title} · ${wk.mission}</div>`;

  const subs = TEAMS.map(t => ({ t, d: S.submissions[`${t}_${S.feedWeek}`], sc: S.scores[`${t}_${S.feedWeek}`] })).filter(x => x.d);
  if (!subs.length) return h + `<div class="empty-state"><div class="ico">🌱</div>아직 제출한 샘이 없습니다</div>`;

  subs.forEach(({ t, d, sc }) => {
    const chipCls = sc ? `chip-${sc}` : 'chip-none';
    const chipTxt = sc ? `${sc}점` : '—';
    const isVideo = d.mediaType === 'video';
    h += `<div class="feed-card">
      <div class="feed-head">
        <div><div class="feed-team">${t}</div><div class="feed-week">${S.feedWeek}주차 · ${wk.title}</div></div>
        <div class="score-chip ${chipCls}">${chipTxt}</div>
      </div>`;
    if (d.media) {
      if (isVideo) h += `<video src="${d.media}" class="feed-video" controls playsinline></video>`;
      else h += `<img src="${d.media}" class="feed-img" alt="제출 이미지" loading="lazy">`;
    }
    h += `<div class="feed-body">`;
    if (d.text) h += `<div class="feed-text">${esc(d.text)}</div>`;
    if (d.count !== undefined && d.count !== null && d.count !== '') {
      const lbl = WEEKS[S.feedWeek-1].fields.find(f => f.key==='count')?.label || '참여 인원';
      h += `<div class="feed-count">👥 ${lbl}: <strong>${d.count}명</strong></div>`;
    }
    if (d.updatedAt) h += `<div class="feed-date">${fmtDate(d.updatedAt.toDate?.() || new Date())}</div>`;
    h += `</div></div>`;
  });
  return h;
}

/* ── LEADERBOARD ── */
function renderLeaderboard() {
  const list = TEAMS.map(t => {
    const wsc = WEEKS.map(w => S.scores[`${t}_${w.n}`] || 0);
    const total = wsc.reduce((a, b) => a + b, 0);
    const subCnt = WEEKS.filter(w => !!S.submissions[`${t}_${w.n}`]).length;
    return { t, wsc, total, subCnt };
  }).sort((a, b) => b.total - a.total || b.subCnt - a.subCnt);

  const totalSubs = Object.keys(S.submissions).length;
  const scoredCnt = Object.keys(S.scores).length;

  let h = `<div class="section-title">🏆 순위표</div>
    <div class="card" style="margin-bottom:16px;">
      <div class="stat-row">
        <div class="stat-item"><div class="stat-num" style="color:var(--pink-dark);">${totalSubs}</div><div class="stat-label">총 제출</div></div>
        <div class="stat-item"><div class="stat-num" style="color:var(--green-dark);">${scoredCnt}</div><div class="stat-label">채점 완료</div></div>
        <div class="stat-item"><div class="stat-num" style="color:#FFB300;">${TEAMS.length}</div><div class="stat-label">참여 팀</div></div>
      </div>
    </div>`;

  list.forEach(({ t, wsc, total, subCnt }, i) => {
    const rank = i === 0 ? 1 : (list[i].total === list[i-1].total ? list[i-1]._rank : i + 1);
    list[i]._rank = rank;
    const emo = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    const cls = rank<=3?`rank-${rank}`:`rank-other`;
    h += `<div class="rank-card">
      <div class="rank-num ${cls}">${emo}</div>
      <div class="rank-info">
        <div class="rank-name">${t}</div>
        <div class="rank-detail">
          ${wsc.map((s,i2) => `<span class="week-chip${s?` has-score`:''}">${i2+1}주: ${s||'—'}</span>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">제출 ${subCnt} / 6주차</div>
      </div>
      <div><div class="rank-total">${total}</div><div class="rank-sub-text">점</div></div>
    </div>`;
  });
  return h;
}

      h += `</div>
        <div class="score-buttons">
          ${[1,3,5].map(s => `<button class="score-btn${sc===s?` sel-${s}`:''}" onclick="setScore('${t}',${w.n},${s})">${s}점</button>`).join('')}
        </div>
      </div>`;
    });

    if (notDone.length) {
      h += `<div style="font-size:12px;color:var(--muted);margin-top:6px;padding:6px 0;">
        미제출: ${notDone.join(', ')}
      </div>`;
    }
    h += `</div>`;
  });
  return h;
}

/* ── TEAM MODAL ── */
function renderTeamModal() {
  if (S.pendingTeam) {
    return `<div class="overlay" onclick="if(event.target===this){S.pendingTeam=null;render()}">
      <div class="modal">
        <div class="modal-title">🔒 ${S.pendingTeam}</div>
        <div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px;">비밀번호를 입력하세요</div>
        <div class="form-group">
          <input type="password" class="form-input" id="team-pw" placeholder="비밀번호"
            onkeydown="if(event.key==='Enter')verifyTeamPw()" autofocus
            style="text-align:center;font-size:20px;letter-spacing:6px;">
        </div>
        <button class="btn btn-pink" onclick="verifyTeamPw()">확인</button>
        <button class="btn btn-outline" style="margin-top:8px;" onclick="S.pendingTeam=null;render()">뒤로</button>
      </div>
    </div>`;
  }
  return `<div class="overlay" onclick="if(event.target===this)closeTeamModal()">
    <div class="modal">
      <div class="modal-title">🌱 내 샘 선택</div>
      <div class="team-grid">
        ${TEAMS.map(t => `<button class="team-btn${S.team===t?' active':''}" onclick="pickTeam('${t}')">${t}</button>`).join('')}
      </div>
      <button class="btn btn-outline" style="margin-top:16px;" onclick="closeTeamModal()">닫기</button>
    </div>
  </div>`;
}

/* ============================================================
   ACTIONS
   ============================================================ */
function go(view) { S.view = view; S.showTeamModal = false; render(); window.scrollTo(0,0); }
function goSubmit(week) { S.submitWeek = week; S.view = 'submit'; render(); window.scrollTo(0,0); }
function setSubmitWeek(n) { S.submitWeek = n; S.previews = {}; render(); window.scrollTo(0,0); }
function setFeedWeek(n) { S.feedWeek = n; render(); }

function openTeamModal() { S.showTeamModal = true; S.pendingTeam = null; render(); }
function closeTeamModal() { S.showTeamModal = false; S.pendingTeam = null; render(); }
function pickTeam(t) {
  S.pendingTeam = t;
  render();
  setTimeout(() => { const el = document.getElementById('team-pw'); if(el) el.focus(); }, 50);
}
function verifyTeamPw() {
  const el = document.getElementById('team-pw');
  if (!el) return;
  const correct = S.passwords[S.pendingTeam] || DEFAULT_PASSWORDS[S.pendingTeam];
  if (el.value === correct) {
    S.team = S.pendingTeam;
    localStorage.setItem('rv_team', S.team);
    S.showTeamModal = false; S.pendingTeam = null;
    render();
    showToast(`${S.team}로 선택됐습니다 🌸`);
  } else {
    showToast('비밀번호가 올바르지 않습니다');
    el.value = '';
  }
}

function adminLogin() {
  const el = document.getElementById('apw');
  if (!el) return;
  if (el.value === ADMIN_PW) { S.isAdmin = true; render(); showToast('관리자 로그인 성공'); }
  else { showToast('비밀번호가 올바르지 않습니다'); el.value = ''; }
}

function togglePreview(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const tog = el.previousElementSibling;
  const open = el.classList.toggle('open');
  if (tog) tog.textContent = (open ? '▾ ' : '▸ ') + '제출 내용 보기';
}

function triggerFile(key, accept) {
  const el = document.getElementById(`fi-${key}`);
  if (el) { el.accept = accept; el.click(); }
}

function onFileChange(input, key) {
  if (!input.files?.[0]) return;
  const file = input.files[0];
  const isVideo = file.type.startsWith('video/');
  const url = URL.createObjectURL(file);
  S.previews[key] = { url, isVideo, file };
  // Update just the upload zone without full re-render
  const zone = input.previousElementSibling;
  if (zone) {
    if (isVideo) zone.innerHTML = `<video src="${url}" class="upload-video" controls playsinline></video>`;
    else zone.innerHTML = `<img src="${url}" class="upload-preview" alt="preview">`;
  }
}

async function doSubmit() {
  if (!S.team) { showToast('샘을 먼저 선택해주세요'); return; }
  const w = WEEKS[S.submitWeek - 1];
  const btn = document.getElementById('sub-btn');
  if (btn) { btn.disabled = true; btn.textContent = '업로드 중... ⏳'; }

  try {
    const data = {};
    for (const f of w.fields) {
      if (f.type === 'image' || f.type === 'media') {
        const prev = S.previews[f.key];
        if (prev?.file) {
          const url = await uploadFile(prev.file);
          data[f.key] = url;
          if (prev.isVideo) data['mediaType'] = 'video';
        } else {
          // Keep existing
          const ex = S.submissions[`${S.team}_${w.n}`];
          if (ex?.[f.key]) { data[f.key] = ex[f.key]; if (ex.mediaType) data.mediaType = ex.mediaType; }
        }
      } else {
        const el = document.getElementById(`fi-${f.key}`);
        if (el) {
          if (f.type === 'number') data[f.key] = el.value ? parseInt(el.value) : null;
          else data[f.key] = el.value;
        }
      }
    }
    await saveSubmission(S.team, w.n, data);
    S.previews = {};
    showToast('제출 완료! 🌸');
    S.view = 'home'; render(); window.scrollTo(0,0);
  } catch(e) {
    console.error(e);
    showToast('오류: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '제출하기 🌸'; }
  }
}

async function saveAllPasswords() {
  const data = {};
  TEAMS.forEach(t => {
    const el = document.getElementById(`pw-${t}`);
    if (el && el.value.trim()) data[t] = el.value.trim();
  });
  await db.collection('config').doc('passwords').set(data);
  showToast('비밀번호가 저장됐습니다 🔑');
}

async function setScore(team, week, score) {
  try {
    await saveScore(team, week, score);
    showToast(`${team} ${week}주차 → ${score}점 저장됨`);
    // scores updated via onSnapshot
  } catch(e) {
    showToast('저장 실패: ' + e.message);
  }
}

/* ============================================================
   UTILS
   ============================================================ */
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function fmtDate(d) {
  if (!d) return '';
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* ============================================================
   INIT
   ============================================================ */
if (initFB()) {
  render(); // show spinner
  startSync();
} else {
  render(); // show setup screen
}
</script>
</body>
</html>
